const container = document.createElement("div");

for (let category in menu) {
  let title = document.createElement("h2");
  title.innerText = category;
  container.appendChild(title);

  menu[category].forEach(item => {
    let div = document.createElement("div");
    div.className = "item";

    let text = document.createElement("span");
    text.innerText = item.name + " ₹" + item.price;

    let btn = document.createElement("button");
    btn.innerText = "Add";
    btn.onclick = () => add(item.name, item.price);

    div.appendChild(text);
    div.appendChild(btn);

    container.appendChild(div);
  });
}

document.body.appendChild(container);

</script>
<h2>Cart</h2>
<div id="cart"></div>

<input placeholder="Name" id="name">
<input placeholder="Table No / Address" id="table">

<select id="type">
<option>Dine-in</option>
<option>Delivery</option>
</select>

<button onclick="order()">Place Order</button>

<script>
let cart = {};

function add(name, price) {
  if (cart[name]) {
    cart[name].qty += 1;
  } else {
    cart[name] = { price: price, qty: 1 };
  }
  display();
}

function removeItem(name) {
  if (cart[name]) {
    cart[name].qty -= 1;
    if (cart[name].qty <= 0) {
      delete cart[name];
    }
  }
  display();
}

function display() {
  let text = "";
  let total = 0;

  for (let item in cart) {
    let itemTotal = cart[item].price * cart[item].qty;
    total += itemTotal;

    text += `
      <div style="margin-bottom:10px;">
        ${item} (₹${cart[item].price}) x ${cart[item].qty}
        <br>
        <button onclick="add('${item}', ${cart[item].price})">➕</button>
        <button onclick="removeItem('${item}')">➖</button>
      </div>
    `;
  }

  text += `<hr><b>Total: ₹${total}</b>`;
  document.getElementById("cart").innerHTML = text;
}

function order() {
  let msg = "🧾 New Order - Haveli Restaurant%0A";

  let total = 0;

  for (let item in cart) {
    let qty = cart[item].qty;
    let price = cart[item].price;
    total += qty * price;

    msg += `${item} x ${qty} = ₹${qty * price}%0A`;
  }

  msg += `%0ATotal: ₹${total}%0A`;

  let name = document.getElementById("name").value;
  let table = document.getElementById("table").value;
  let type = document.getElementById("type").value;

  msg += `%0AType: ${type}`;
  msg += `%0AName: ${name}`;
  msg += `%0AInfo: ${table}`;

  window.open("https://wa.me/919235878373?text=" + msg);
}
